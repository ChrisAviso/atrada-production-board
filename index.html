<html lang="en">
<head>
<meta charset="UTF-8">

<title>Production Board — Atrada</title>
<script>
  (function(){
      var img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload = function(){
            var size = Math.max(img.naturalWidth, img.naturalHeight);
            var canvas = document.createElement('canvas');
            canvas.width = size; canvas.height = size;
            var ctx = canvas.getContext('2d');
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0,0,size,size);
            var dx = Math.round((size - img.naturalWidth)/2);
            var dy = Math.round((size - img.naturalHeight)/2);
            ctx.drawImage(img, dx, dy, img.naturalWidth, img.naturalHeight);
            try {
                    var url = canvas.toDataURL('image/png');
                    var link = document.querySelector('link[rel="icon"]') || document.createElement('link');
                    link.rel = 'icon';
                    link.type = 'image/png';
                    link.href = url;
                    if (!link.parentNode) document.head.appendChild(link);
            } catch(e) {}
      };
      img.src = 'https://chrisaviso.github.io/atrada-production-board/atrada-logo.png';
  })();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">

<style>
  :root{
    --bg:#e7e9f1;
    --surface:#ffffff;
    --border:#d5d9e6;
    --text:#22242f;
    --text-dim:#585d73;
    --primary:#0b5cff;
    --primary-dark:#0847cc;
    --green:#0da374;
    --red:#d63d57;
    --amber:#e0921a;
    --gray-pill:#e4e7f1;
    --radius:10px;
    --topbar-bg:#1d2233;
    --shadow:0 1px 2px rgba(20,22,40,.08), 0 8px 24px rgba(20,22,40,.09);
    --mod:#8a6d00; --mod-pale:#fdf6dc;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; font-family:'Inter',system-ui,sans-serif; background:var(--bg); color:var(--text);
    -webkit-font-smoothing:antialiased;
  }
  .hidden{display:none !important;}

  #authScreen{
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    background:
      radial-gradient(circle at 15% 20%, rgba(58,92,235,.10), transparent 40%),
      radial-gradient(circle at 85% 80%, rgba(18,184,134,.10), transparent 40%),
      var(--bg);
  }
  .auth-card{
    width:380px; background:var(--surface); border:1px solid var(--border); border-radius:16px;
    box-shadow:var(--shadow); padding:36px 32px 28px;
  }
  .auth-mark{
    width:40px;height:40px;border-radius:10px; background:linear-gradient(135deg,var(--primary),#7c5cf0);
    display:flex;align-items:center;justify-content:center; color:white;font-weight:800;font-size:14px;margin-bottom:18px;
  }
  .auth-card h1{font-size:20px;margin:0 0 4px;letter-spacing:-0.01em;}
  .auth-card p.sub{color:var(--text-dim);font-size:13.5px;margin:0 0 22px;}
  .field{margin-bottom:14px;}
  .field label{font-size:12.5px;font-weight:600;color:var(--text-dim);display:block;margin-bottom:6px;}
  .field input{
    width:100%;padding:10px 12px;border:1.5px solid var(--border);
    border-radius:8px;font-size:14px;font-family:inherit;background:#fbfbfd;
  }
  .field input:focus{outline:none;border-color:var(--primary);background:white;}
  .btn{
    width:100%;padding:11px;border:none;border-radius:8px;background:var(--primary);color:white;
    font-weight:600;font-size:14px;cursor:pointer;font-family:inherit;
  }
  .btn:hover{background:var(--primary-dark);}
  .auth-toggle{text-align:center;margin-top:14px;font-size:13.5px;color:var(--text-dim);}
  .auth-toggle a{color:var(--primary);cursor:pointer;text-decoration:none;font-weight:600;}
  .auth-msg{font-size:13px;padding:9px 11px;border-radius:8px;margin-bottom:14px;}
  .auth-msg.error{background:#fdecef;color:#c22a44;}
  .auth-msg.ok{background:#e8f9f2;color:#0d8c62;}

  #appScreen{min-height:100vh;}
  header.topbar{
    background:var(--topbar-bg);border-bottom:1px solid #12162399;
    padding:14px 26px;display:flex;align-items:center;justify-content:space-between;
    position:sticky;top:0;z-index:20;
  }
  .brand{display:flex;align-items:center;gap:10px;}
  .brand .mark{width:30px;height:30px;border-radius:8px;object-fit:contain;flex-shrink:0;}
  .brand h1{font-size:16px;margin:0;letter-spacing:-0.01em;color:#ffffff;}
  .brand .sub{font-size:12px;color:rgba(255,255,255,.55);}
  .topbar-right{display:flex;align-items:center;gap:14px;}
  .user-chip{font-size:13px;color:rgba(255,255,255,.7);}
  .icon-btn{
    border:1.5px solid var(--border);background:white;border-radius:8px;
    padding:7px 13px;font-size:13px;font-weight:600;color:var(--text);cursor:pointer;font-family:inherit;
  }
  .icon-btn:hover{border-color:var(--primary);color:var(--primary);}

  main{max-width:1900px;margin:0 auto;padding:22px 26px 80px;}

  .toolbar-top{display:flex;gap:10px;align-items:center;margin-bottom:12px;}
  .toolbar-top .search-box{flex:1;}
  .search-box{
    flex:1;min-width:200px;padding:9px 14px;border:1.5px solid var(--border);
    border-radius:8px;font-size:13.5px;background:white;font-family:inherit;
  }
  .search-box:focus{outline:none;border-color:var(--primary);}

  .filters-bar{
    display:flex;gap:22px;flex-wrap:wrap;align-items:flex-end;
    background:#fafbff;border:1px solid var(--border);border-radius:12px;
    padding:14px 18px;margin-bottom:20px;
  }
  .filter-group{display:flex;flex-direction:column;gap:7px;}
  .filter-group-label{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text-dim);}
  .filter-group-controls{display:flex;gap:8px;flex-wrap:wrap;}
  .filter-select{
    padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;
    font-size:13.5px;background:white;font-family:inherit;color:var(--text);cursor:pointer;
  }
  .filter-select:focus{outline:none;border-color:var(--primary);}
  .filters-bar-clear{margin-left:auto;align-self:center;}

  .open-panel{
    background:#fafbff;border:1px solid var(--border);border-radius:12px;padding:14px 18px;margin-bottom:16px;
  }
  .open-panel-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--text-dim);margin-bottom:10px;}
  .open-panel-counts{display:flex;gap:10px;margin-bottom:4px;flex-wrap:wrap;}
  .count-chip{font-size:12px;font-weight:700;padding:5px 12px;border-radius:20px;}
  .count-chip.count-total{background:var(--gray-pill);color:var(--text-dim);}
  .count-chip.count-progress{background:#eef2ff;color:var(--primary-dark);}
  .count-chip.count-done{background:#eefaf1;color:var(--green);}
  .count-chip.count-behind{background:#fdedef;color:var(--red);}

  .so-group{margin-bottom:18px;}
  .so-group-head{
    font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--text-dim);
    padding:0 2px 8px;
  }
  .unit-row{
    display:grid;grid-template-columns:9px 100px 1.6fr 110px 90px 130px;gap:14px;align-items:center;
    padding:9px 10px;font-size:13px;border-bottom:1px solid var(--border);cursor:pointer;border-radius:6px;
    transition:background .1s;
  }
  .unit-row-head{
    display:grid;grid-template-columns:9px 100px 1.6fr 110px 90px 130px;gap:14px;
    padding:0 10px 8px;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;
    color:var(--text-dim);border-bottom:1.5px solid var(--border);margin-bottom:2px;
  }
  .unit-row:hover{background:#eef1ff;}
  .unit-row.active{background:#eef1ff;border-left:3px solid var(--primary);}
  .unit-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
  .unit-dot.dot-ontrack{background:var(--green);}
  .unit-dot.dot-behind{background:var(--red);}
  .unit-dot.dot-progress{background:var(--primary);}
  .unit-dot.dot-null{background:var(--border);}
  .unit-class{font-weight:700;color:var(--text-dim);font-size:11.5px;text-transform:uppercase;letter-spacing:.03em;}
  .unit-class.modulate{color:var(--mod);}
  .unit-name{color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .unit-progress-track{height:5px;background:var(--gray-pill);border-radius:3px;overflow:hidden;margin-top:5px;}
  .unit-progress-fill{height:100%;background:var(--primary);}
  .unit-progress-fill.done{background:var(--green);}
  .unit-qty{color:var(--text-dim);font-size:12px;text-align:right;font-variant-numeric:tabular-nums;}
  .unit-status{
    font-size:11px;font-weight:700;white-space:nowrap;justify-self:start;border-radius:12px;padding:3px 10px;
  }
  .unit-status.st-ontrack{background:#eefaf1;color:var(--green);}
  .unit-status.st-behind{background:#fdedef;color:var(--red);}
  .unit-status.st-progress{background:rgba(11,92,255,.1);color:var(--primary-dark);}
  .unit-status.st-notstarted{background:var(--gray-pill);color:var(--text-dim);}

  .layout{display:grid;grid-template-columns:1.5fr 1fr;gap:18px;align-items:start;}
  @media (max-width:1000px){ .layout{grid-template-columns:1fr;} }
  .detail-panel{
    background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
    box-shadow:var(--shadow);padding:18px 20px;position:sticky;top:80px;
  }
  .dp-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:2px;gap:10px;}
  .dp-title{font-size:15px;font-weight:600;}
  .dp-sub{font-size:12.5px;color:var(--text-dim);margin-bottom:14px;}
  .section-lbl{
    font-size:10.5px;font-weight:700;color:var(--text-dim);text-transform:uppercase;
    letter-spacing:.05em;margin:16px 0 8px;
  }
  .task-row{
    display:flex;align-items:center;gap:10px;padding:9px 2px;border-bottom:1px solid var(--border);font-size:13px;
  }
  .task-row:last-child{border-bottom:none;}
  .task-row input[type=checkbox]{width:16px;height:16px;accent-color:var(--green);cursor:pointer;flex-shrink:0;}
  .task-row .tname{flex:1;min-width:0;}
  .task-row .tname.done{text-decoration:line-through;color:var(--text-dim);}
  .task-row .tname.na{text-decoration:line-through;color:var(--border);font-style:italic;}
  .task-row .tdates{
    font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--text-dim);white-space:nowrap;text-align:right;
  }
  .task-row .tdates .dur{display:block;font-weight:600;color:var(--text);}
  .task-row .tmeta{font-size:10.5px;color:var(--text-dim);white-space:nowrap;background:var(--gray-pill);padding:2px 8px;border-radius:10px;flex-shrink:0;}
  .empty-state{color:var(--text-dim);font-size:13px;text-align:center;padding:40px 0;}
</style>
</head>

        <h1>Production Board</h1>

    </div>
    <div class="topbar-right">
      <span class="user-chip" id="userChip"></span>

</div>

<script>
const SUPABASE_URL = 'https://kzqtlvfbxkivztrccwns.supabase.co';
const SUPABASE_KEY = 'sb_publishable_hkqUiDvXRTturf1cL5t_Aw_2vulJ8_S';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let allUnits = [];
let allTasksByUnit = {};
let activeClass = '';
let searchText = '';
let selectedUnitId = null;
let isSignUpMode = false;

const CLASS_ORDER = ['Containers','Manufactured','Real Ezy','Modulate','Imported','Lubestation','Buy & Sell'];

function classLabel(cls){ return cls || 'Unclassed'; }

function fmtDate(d){
  if (!d) return '—';
  const dt = new Date(d + 'T00:00:00');
  const dd = String(dt.getDate()).padStart(2,'0');
  const mm = String(dt.getMonth()+1).padStart(2,'0');
  const yy = String(dt.getFullYear()).slice(-2);
  return `${dd}/${mm}/${yy}`;
}

function orderTasksByChain(tasks){
  const byId = new Map(tasks.map(t => [t.id, t]));
  const nextOf = new Map();
  tasks.forEach(t => { if (t.predecessor_task_id) nextOf.set(t.predecessor_task_id, t); });

  const roots = tasks.filter(t => !t.predecessor_task_id || !byId.has(t.predecessor_task_id));
  const ordered = [];
  const visited = new Set();
  roots.forEach(root => {
    let cur = root;
    while (cur && !visited.has(cur.id)){
      ordered.push(cur);
      visited.add(cur.id);
      cur = nextOf.get(cur.id);
    }
  });
  tasks.forEach(t => { if (!visited.has(t.id)) ordered.push(t); });
  return ordered;
}

function computeUnitProgress(unitId){
  const hl2 = (allTasksByUnit[unitId] || []).filter(t => t.hierarchy_level === 2);
  const ordered = orderTasksByChain(hl2);
  const tasks = ordered.filter(t => !t.is_not_applicable);
  if (tasks.length === 0) return { pct: 0, currentStage: 'No tasks', status: 'not_started', overdue: false };
  const done = tasks.filter(t => t.percent_complete_numeric >= 1).length;
  const pct = Math.round((done / tasks.length) * 100);
  const next = tasks.find(t => t.percent_complete_numeric < 1);
  const currentStage = next ? next.task_name : 'Dispatch';
  let status = 'not_started';
  if (pct === 100) status = 'complete';
  else if (done > 0) status = 'in_progress';
  const today = new Date();
  const overdue = next && next.completion_date_planned && new Date(next.completion_date_planned) < today && pct < 100;
  return { pct, currentStage, status: overdue ? 'overdue' : status, overdue };
}

async function checkSession(){
  const { data: { session } } = await sb.auth.getSession();
  if (session){
    document.getElementById('authScreen').classList.add('hidden');
    document.getElementById('appScreen').classList.remove('hidden');
    document.getElementById('userChip').textContent = session.user.email;
    loadBoard();
  } else {
    document.getElementById('authScreen').classList.remove('hidden');
    document.getElementById('appScreen').classList.add('hidden');
  }
}

document.getElementById('authSubmit').addEventListener('click', async () => {
  const email = document.getElementById('authEmail').value.trim();
  const password = document.getElementById('authPassword').value;
  const msgEl = document.getElementById('authMsg');
  msgEl.innerHTML = '';
  if (!email || !password){ msgEl.innerHTML = '<div class="auth-msg error">Enter email and password.</div>'; return; }

  if (isSignUpMode){
    const { error } = await sb.auth.signUp({ email, password });
    if (error){ msgEl.innerHTML = `<div class="auth-msg error">${error.message}</div>`; return; }
    msgEl.innerHTML = '<div class="auth-msg ok">Account created — check your email to confirm, then sign in.</div>';
  } else {
    const { error } = await sb.auth.signInWithPassword({ email, password });
    if (error){ msgEl.innerHTML = `<div class="auth-msg error">${error.message}</div>`; return; }
    checkSession();
  }
});

document.getElementById('authToggleLink').addEventListener('click', () => {
  isSignUpMode = !isSignUpMode;
  document.getElementById('authTitle').textContent = isSignUpMode ? 'Create an account' : 'Sign in';
  document.getElementById('authSubmit').textContent = isSignUpMode ? 'Create account' : 'Sign in';
  document.getElementById('authToggleText').textContent = isSignUpMode ? 'Already have an account?' : 'No account?';
  document.getElementById('authToggleLink').textContent = isSignUpMode ? 'Sign in' : 'Create one';
});

document.getElementById('signOutBtn').addEventListener('click', async () => { await sb.auth.signOut(); checkSession(); });
document.getElementById('refreshBtn').addEventListener('click', () => loadBoard());
document.getElementById('searchBox').addEventListener('input', (e) => { searchText = e.target.value.toLowerCase(); renderUnitList(); });
document.getElementById('classFilter').addEventListener('change', (e) => { activeClass = e.target.value; renderStats(); renderUnitList(); });
document.getElementById('clearFiltersBtn').addEventListener('click', () => {
  activeClass = ''; searchText = '';
  document.getElementById('classFilter').value = '';
  document.getElementById('searchBox').value = '';
  renderStats(); renderUnitList();
});

async function fetchAllRows(query){
  const pageSize = 1000;
  let from = 0;
  let all = [];
  while (true){
    const { data, error } = await query.range(from, from + pageSize - 1);
    if (error) return { data: null, error };
    all = all.concat(data || []);
    if (!data || data.length < pageSize) break;
    from += pageSize;
  }
  return { data: all, error: null };
}

async function loadBoard(){
  const { data: units, error: unitErr } = await sb
    .from('prod_units')
    .select('id, so_number, unit_name, class, qty, difot_date')
    .order('so_number');
  if (unitErr){ console.error(unitErr); return; }
  allUnits = units || [];

  const { data: tasks, error: taskErr } = await fetchAllRows(
    sb.from('prod_tasks')
      .select('id, unit_id, task_name, execution_group, hierarchy_level, duration_days, start_date, completion_date_planned, percent_complete_numeric, is_not_applicable, predecessor_task_id')
  );
  if (taskErr){ console.error(taskErr); return; }

  allTasksByUnit = {};
  (tasks || []).forEach(t => {
    if (!allTasksByUnit[t.unit_id]) allTasksByUnit[t.unit_id] = [];
    allTasksByUnit[t.unit_id].push(t);
  });

  populateClassFilter();
  renderStats();
  renderUnitList();
}

function populateClassFilter(){
  const el = document.getElementById('classFilter');
  el.innerHTML = '<option value="">All Classes</option>' +
    CLASS_ORDER.map(c => `<option value="${c}">${c}</option>`).join('');
}

function filteredUnits(){
  return allUnits.filter(u => {
    if (activeClass && u.class !== activeClass) return false;
    if (searchText){
      const hay = ((u.unit_name || '') + ' ' + (u.so_number || '')).toLowerCase();
      if (!hay.includes(searchText)) return false;
    }
    return true;
  });
}

function renderStats(){
  const filtered = filteredUnits();
  let inProgress = 0, done = 0, overdue = 0;
  filtered.forEach(u => {
    const p = computeUnitProgress(u.id);
    if (p.status === 'in_progress') inProgress++;
    if (p.status === 'complete') done++;
    if (p.overdue) overdue++;
  });
  document.getElementById('statTotal').textContent = `${filtered.length} total`;
  document.getElementById('statInProgress').textContent = `${inProgress} in progress`;
  document.getElementById('statDone').textContent = `${done} dispatch ready`;
  document.getElementById('statOverdue').textContent = `${overdue} behind schedule`;
}

function statusInfo(p){
  if (p.overdue) return { dot: 'dot-behind', badge: 'st-behind', label: 'Overdue' };
  if (p.status === 'complete') return { dot: 'dot-ontrack', badge: 'st-ontrack', label: 'Dispatch' };
  if (p.status === 'in_progress') return { dot: 'dot-progress', badge: 'st-progress', label: p.currentStage };
  return { dot: 'dot-null', badge: 'st-notstarted', label: p.currentStage };
}

function renderUnitList(){
  const el = document.getElementById('unitList');
  el.innerHTML = '';
  const filtered = filteredUnits();

  const bySo = {};
  filtered.forEach(u => { (bySo[u.so_number] = bySo[u.so_number] || []).push(u); });

  const soKeys = Object.keys(bySo).sort();
  if (soKeys.length === 0){
    el.innerHTML = '<div class="empty-state">No units match the current filters.</div>';
    return;
  }

  soKeys.forEach(so => {
    const group = document.createElement('div');
    group.className = 'so-group';
    const head = document.createElement('div');
    head.className = 'so-group-head';
    head.textContent = `${so} \u00b7 ${bySo[so].length} unit${bySo[so].length > 1 ? 's' : ''}`;
    group.appendChild(head);

    const rowHead = document.createElement('div');
    rowHead.className = 'unit-row-head';
    rowHead.innerHTML = '<span></span><span>Class</span><span>Unit</span><span>Qty</span><span></span><span>Stage</span>';
    group.appendChild(rowHead);

    bySo[so].forEach(u => {
      const p = computeUnitProgress(u.id);
      const s = statusInfo(p);
      const row = document.createElement('div');
      row.className = 'unit-row' + (u.id === selectedUnitId ? ' active' : '');
      row.innerHTML = `
        <span class="unit-dot ${s.dot}"></span>
        <span class="unit-class ${u.class === 'Modulate' ? 'modulate' : ''}">${classLabel(u.class)}</span>
        <div>
          <div class="unit-name">${u.unit_name || 'Untitled unit'}</div>
          <div class="unit-progress-track"><div class="unit-progress-fill ${p.status === 'complete' ? 'done' : ''}" style="width:${p.pct}%;"></div></div>
        </div>
        <span class="unit-qty">Qty ${u.qty}</span>
        <span></span>
        <span class="unit-status ${s.badge}">${s.label}</span>
      `;
      row.addEventListener('click', () => { selectedUnitId = u.id; renderUnitList(); renderDetail(u); });
      group.appendChild(row);
    });
    el.appendChild(group);
  });
}

function renderDetail(unit){
  const panel = document.getElementById('detailPanel');
  const tasks = orderTasksByChain((allTasksByUnit[unit.id] || []).filter(t => t.hierarchy_level === 2));

  panel.innerHTML = `
    <div class="dp-head">
      <div class="dp-title">${unit.unit_name || 'Untitled unit'}</div>
      <span class="unit-class ${unit.class === 'Modulate' ? 'modulate' : ''}">${classLabel(unit.class)}</span>
    </div>
    <div class="dp-sub">${unit.so_number} &middot; Qty ${unit.qty}</div>
    <div class="section-lbl">Tasks</div>
    <div id="taskListEl"></div>
  `;

  const taskListEl = panel.querySelector('#taskListEl');
  if (tasks.length === 0){
    taskListEl.innerHTML = '<div class="empty-state">No tasks recorded for this unit yet.</div>';
    return;
  }

  tasks.forEach(t => {
    const row = document.createElement('div');
    row.className = 'task-row';
    const isDone = t.percent_complete_numeric >= 1;
    row.innerHTML = `
      <input type="checkbox" ${isDone ? 'checked' : ''} ${t.is_not_applicable ? 'disabled' : ''} data-task-id="${t.id}">
      <span class="tname ${t.is_not_applicable ? 'na' : (isDone ? 'done' : '')}">${t.task_name}${t.is_not_applicable ? ' (N/A)' : ''}</span>
      <span class="tdates"><span class="dur">${t.duration_days}d</span>${fmtDate(t.start_date)} \u2192 ${fmtDate(t.completion_date_planned)}</span>
      <span class="tmeta">${t.execution_group || ''}</span>
    `;
    taskListEl.appendChild(row);
  });

  taskListEl.querySelectorAll('input[type=checkbox]').forEach(cb => {
    cb.addEventListener('change', async (e) => {
      const taskId = e.target.getAttribute('data-task-id');
      const checked = e.target.checked;
      const { error } = await sb.from('prod_tasks').update({
        percent_complete_numeric: checked ? 1 : 0,
        actual_completion_date: checked ? new Date().toISOString().slice(0,10) : null,
      }).eq('id', taskId);
      if (error){ alert('Failed to update: ' + error.message); return; }
      const t = allTasksByUnit[unit.id].find(x => x.id === taskId);
      if (t){ t.percent_complete_numeric = checked ? 1 : 0; }
      renderStats();
      renderUnitList();
      renderDetail(unit);
    });
  });
}

checkSession();
</script>
</body>
</html>
